name: reproducibility

# Checks that the published results are intact and coherent on every platform.
#
# The honest boundary of this workflow: it does NOT re-run the pipeline. The
# database is not distributed (see SETUP.md), and a training run needs a GPU and
# many hours, so no hosted runner can reproduce the numbers from scratch.
#
# What it does verify, which is what a reader cloning this repository can check:
#   - the result files are present, parseable and correctly shaped
#   - every model is ranked on a leak-free out-of-fold WIS
#   - blank test WIS values stay confined to models with no native interval
#     (filling those from test residuals would leak the test set)
#   - the numbers quoted in the README trace back to a result file
#   - the web dashboard's aggregates are valid JSON
#
# It runs on Linux, Windows and macOS with no dependency install, because the
# validator uses the standard library only. See portability.yml for why a full
# `uv sync` is not viable on a hosted runner.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  results:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Shipped results are intact and self-consistent
        run: python scripts/validate_results.py

      # Every file a document cites by path must be a file the reader can open.
      # Baselined at the current backlog of cross-references into documents that
      # were pruned; the gate fails on NEW dangling citations.
      - name: Documents cite files that exist
        run: python scripts/check_doc_citations.py --list --max 27


  tests:
    # Runs EVERY tracked test file except the ones measured to be unrunnable on a
    # runner, listed with a reason in scripts/ci_test_exclusions.txt. Exclusions
    # rather than inclusions, so a new test file is covered the day it lands.
    #
    # Dependencies stop short of torch: pyproject pins it to the pytorch-cu128
    # index for linux/win32, so installing it would pull multi-gigabyte CUDA
    # wheels onto a GPU-less runner. Files that need it are in the DEP category.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install the light dependency set
        run: |
          python -m pip install --upgrade pip
          pip install pytest "numpy<2.2" scipy scikit-learn optuna polars pandas pyyaml requests

      - name: Show what will run
        run: python scripts/ci_run_tests.py --list

      # One pytest process per file — macOS segfaults when LightGBM/OpenMP is
      # initialised twice in a process, and a failure names the file that broke.
      - name: Run every runnable test file
        run: python scripts/ci_run_tests.py
